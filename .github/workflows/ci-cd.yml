name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: 9.0.x
  IMAGE_NAME: ghcr.io/ibrohimodinaev/authserviceyovar

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore AuthService.sln

      - name: Build
        run: dotnet build AuthService.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AuthService.sln --configuration Release --no-build --logger trx

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: |
          docker build \
            --tag "${IMAGE_NAME}:${GITHUB_SHA}" \
            --tag "${IMAGE_NAME}:latest" \
            .

      - name: Push image
        run: |
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"
          docker push "${IMAGE_NAME}:latest"

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

    steps:
      - name: Skip deploy when server secrets are not configured
        if: env.DEPLOY_HOST == ''
        run: echo "DEPLOY_HOST is not configured. Docker image was pushed, deploy was skipped."

      - name: Checkout
        if: env.DEPLOY_HOST != ''
        uses: actions/checkout@v4

      - name: Prepare SSH
        if: env.DEPLOY_HOST != ''
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload compose file
        if: env.DEPLOY_HOST != ''
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp docker-compose.production.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/docker-compose.production.yml"

      - name: Upload production environment
        if: env.DEPLOY_HOST != ''
        run: |
          printf '%s\n' "$PRODUCTION_ENV" | ssh "$DEPLOY_USER@$DEPLOY_HOST" "cat > '$DEPLOY_PATH/.env.production'"

      - name: Login server to GHCR
        if: env.DEPLOY_HOST != '' && env.GHCR_TOKEN != ''
        run: |
          echo "$GHCR_TOKEN" | ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"

      - name: Pull and restart
        if: env.DEPLOY_HOST != ''
        run: |
          IMAGE="${IMAGE_NAME}:${GITHUB_SHA}"
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && AUTHSERVICE_IMAGE='$IMAGE' docker compose -f docker-compose.production.yml pull && AUTHSERVICE_IMAGE='$IMAGE' docker compose -f docker-compose.production.yml up -d --remove-orphans"

      - name: Check readiness
        if: env.DEPLOY_HOST != ''
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && docker compose -f docker-compose.production.yml ps && curl -fsS http://127.0.0.1:\${AUTHSERVICE_HTTP_PORT:-8080}/health/ready"
