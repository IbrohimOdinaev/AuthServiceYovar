name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore AuthService.sln

      - name: Build
        run: dotnet build AuthService.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AuthService.sln --configuration Release --no-build



          
