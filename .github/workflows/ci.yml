name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/ibrohimodinaev/authserviceyovar

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore AuthService.sln

      - name: Build
        run: dotnet build AuthService.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AuthService.sln --configuration Release --no-build

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build

    steps: 
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t authservice:ci .

  docker-push:
    name: Docker push
    run-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        run: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build docker image
        run: |
          docker build \
            -t "${IMAGE_NAME}:${{ github.sha }}" \
            -t "${IMAGE_NAME}:latest" \
            .

      - name: Push Docker image
        run: |
          docker push "${IMAGE_NAME}:${{ github.sha}}"
          docker push "${IMAGE_NAME}:latest"


      



          
