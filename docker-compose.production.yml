services:
  postgres:
    image: postgres:16-alpine
    container_name: authservice-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auth_service}
      POSTGRES_USER: ${POSTGRES_USER:-auth_service_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - authservice_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auth_service_user} -d ${POSTGRES_DB:-auth_service}"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - authservice

  migrate:
    image: ${AUTHSERVICE_IMAGE:-ghcr.io/ibrohimodinaev/authserviceyovar:latest}
    container_name: authservice-migrate
    restart: "no"
    env_file:
      - .env.production
    entrypoint: ["./migrate-authdb"]
    secrets:
      - source: authservice-signing.pfx
        target: authservice-signing.pfx
      - source: authservice-encryption.pfx
        target: authservice-encryption.pfx
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - authservice

  authservice:
    image: ${AUTHSERVICE_IMAGE:-ghcr.io/ibrohimodinaev/authserviceyovar:latest}
    container_name: authservice-api
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:${AUTHSERVICE_HTTP_PORT:-8080}:8080"
    secrets:
      - source: authservice-signing.pfx
        target: authservice-signing.pfx
      - source: authservice-encryption.pfx
        target: authservice-encryption.pfx
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      - authservice

secrets:
  authservice-signing.pfx:
    file: ${AUTHSERVICE_CERTS_DIR:-./certs}/authservice-signing.pfx
  authservice-encryption.pfx:
    file: ${AUTHSERVICE_CERTS_DIR:-./certs}/authservice-encryption.pfx

volumes:
  authservice_postgres_data:

networks:
  authservice:
